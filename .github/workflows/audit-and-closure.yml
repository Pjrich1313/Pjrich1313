name: Audit and Closure

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check dependency graph status
        id: dependency_graph
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status="$(gh api "repos/${{ github.repository }}" --jq '.security_and_analysis.dependency_graph.status // "unknown"' || echo "unknown")"
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          echo "Dependency graph status: ${status}"

      - name: Dependency review
        if: ${{ steps.dependency_graph.outputs.status == 'enabled' }}
        uses: actions/dependency-review-action@v4

      - name: Dependency review skipped
        if: ${{ steps.dependency_graph.outputs.status != 'enabled' }}
        run: |
          echo "Dependency review skipped because dependency graph is not enabled for this repository."

  auto_merge:
    name: Auto-merge PR
    if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'auto-merge') }}
    needs: audit
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge pull request
        uses: peter-evans/merge-pull-request@v3
        with:
          pull-request: ${{ github.event.pull_request.number }}
          merge-method: squash
          delete-branch: true
